<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style-prj.css" />
    <title>Michelle Lefebvre</title>
    <!-- font-awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"

<body>
    <section id="projects-slider">
        <div class="slider-container">
            <div class="left-slide">
                <div style="background-color: #ec76c0">
                    <h1>Doggie Match</h1>
                    <p>Hackathon Project</p>
                </div>
                <div style="background-color: #2a86ba">
                    <h1>Mad Science</h1>
                    <p>with it's mountains</p>
                </div>
                <div style="background-color: #eabc07">
                    <h1>Jitters</h1>

                </div>
                <div style=" background-color: #11fcb7">
                    <h1>E-Bike</h1>
                    <p>AUGMENTED REALITY</p>
                    <img src="images/e-bikeQRcode.png" alt="QR code for E-Bike project" class="qr-code">
                </div>
            </div>

            <div class=" right-slide">
                <div style="
            background-image: url('images/Collage-AR.png');
          "></div>
                <div style="
            background-image: url('images/collage-Jitters.png');
          "></div>
                <div style="
            background-image: url('images/Collage_MadScience.jpg');
          "></div>
                <div style="
            background-image: url('images/Collage_DoogieMatch.jpg');
          "></div>
            </div>
            <div class="action-buttons">
                <button class="down-button">

                </button>
                <button class="up-button">
                    <i class="fas fa-arrow-up"></i>
